services:
  auth-ms:
    build: .
    ports:
      - "8082:8082"
    environment:
      # TODO script liquibase rodando uma única vez no CI/CD
      SPRING_DATASOURCE_URL: jdbc:postgresql://${DB_HOST:-host.docker.internal}:5432/auth_ms
      SPRING_DATASOURCE_USERNAME: usr
      SPRING_DATASOURCE_PASSWORD: pwd
      SPRING_LIQUIBASE_ENABLED: "true"
      SPRING_CLOUD_AWS_SQS_ENDPOINT: http://localstack:4566
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      localstack:
        condition: service_started

  localstack:
    # latest (2026.x) exige LOCALSTACK_AUTH_TOKEN; 4.14 funciona sem conta
    image: localstack/localstack:4.14.0
    ports:
      - "4566:4566"
    environment:
      SERVICES: sqs
      DEBUG: 0
    volumes:
      - ./localstack/init:/etc/localstack/init/ready.d
